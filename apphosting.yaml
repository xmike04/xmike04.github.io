# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

# Environment variables and secrets injected at build/runtime.
# Secrets are stored in Cloud Secret Manager and referenced by name here, so
# their values never live in this (public) repo. Grant access first with:
#   firebase apphosting:secrets:set OPENAI_API_KEY
# then reference them below. Uncomment and adjust as needed:
#
# env:
#   - variable: OPENAI_API_KEY
#     secret: OPENAI_API_KEY        # resolved from Cloud Secret Manager
#     availability:
#       - RUNTIME
#   - variable: OPENAI_MODEL
#     value: gpt-5.4-mini           # non-secret, safe to inline
#     availability:
#       - BUILD
#       - RUNTIME
